<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" width="680" height="500">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2C5282" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="500" fill="white"/>
  <rect x="0" y="0" width="680" height="3" fill="#2C5282"/>

  <!-- Subtitle -->
  <text x="340" y="24" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" fill="#718096" font-style="italic">experimento de García y Koelling (1966) · diseño y resultados</text>

  <!-- ═══ FASE DE ENTRENAMIENTO ═══ -->
  <text x="40" y="45" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#2C5282">FASE DE ENTRENAMIENTO</text>
  <text x="40" y="58" font-family="Georgia,Palatino,serif" font-size="10" fill="#718096" font-style="italic">todos los animales reciben el mismo compuesto</text>

  <!-- Compound stimulus box (center x=370) -->
  <rect x="245" y="65" width="250" height="38" rx="4" fill="#EBF4FF" stroke="#2C5282" stroke-width="1.2"/>
  <text x="370" y="80" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="12" font-weight="bold" fill="#2C5282">Sabor + Audiovisual</text>
  <text x="370" y="95" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="10" fill="#4A6FA5" font-style="italic">(compuesto)</text>

  <!-- Fork: stem + horizontal bar + two drops -->
  <line x1="370" y1="103" x2="370" y2="122" stroke="#2C5282" stroke-width="1.2"/>
  <line x1="280" y1="122" x2="460" y2="122" stroke="#2C5282" stroke-width="1.2"/>
  <line x1="280" y1="122" x2="280" y2="148" stroke="#C05621" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="460" y1="122" x2="460" y2="148" stroke="#276749" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Left: Descarga eléctrica -->
  <rect x="180" y="148" width="200" height="52" rx="4" fill="#FFF8F5" stroke="#C05621" stroke-width="1.2"/>
  <text x="280" y="167" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="12" font-weight="bold" fill="#C05621">Descarga eléctrica</text>
  <text x="280" y="183" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="10" fill="#A05010" font-style="italic">(inmediata)</text>

  <!-- Right: Malestar gastrointestinal -->
  <rect x="360" y="148" width="200" height="52" rx="4" fill="#F0FFF4" stroke="#276749" stroke-width="1.2"/>
  <text x="460" y="163" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="12" font-weight="bold" fill="#276749">Malestar</text>
  <text x="460" y="178" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="12" font-weight="bold" fill="#276749">gastrointestinal</text>
  <text x="460" y="193" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="10" fill="#1D6B40" font-style="italic">(horas después)</text>

  <!-- Dashed separator -->
  <line x1="40" y1="215" x2="640" y2="215" stroke="#CBD5E0" stroke-width="0.8" stroke-dasharray="5 4"/>

  <!-- ═══ FASE DE PRUEBA ═══ -->
  <text x="40" y="233" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#2C5282">FASE DE PRUEBA</text>
  <text x="40" y="246" font-family="Georgia,Palatino,serif" font-size="10" fill="#718096" font-style="italic">estímulos presentados por separado</text>

  <!-- Column headers -->
  <text x="280" y="264" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#444">Sabor solo</text>
  <text x="460" y="264" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#444">Audiovisual solo</text>
  <!-- Column header underlines -->
  <line x1="200" y1="268" x2="360" y2="268" stroke="#CBD5E0" stroke-width="0.8"/>
  <line x1="380" y1="268" x2="540" y2="268" stroke="#CBD5E0" stroke-width="0.8"/>

  <!-- ── Row 1: Grupo descarga ── -->
  <!-- Row label -->
  <text x="100" y="302" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#C05621">Grupo</text>
  <text x="100" y="317" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#C05621">descarga</text>

  <!-- Cell (descarga × sabor): sin aversión -->
  <rect x="200" y="275" width="160" height="72" rx="4" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="1"/>
  <text x="280" y="300" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" fill="#A0AEC0">sin aversión</text>
  <!-- bar background -->
  <rect x="220" y="310" width="120" height="11" rx="3" fill="#EDF2F7"/>
  <!-- bar fill: short -->
  <rect x="220" y="310" width="18" height="11" rx="3" fill="#CBD5E0"/>
  <text x="280" y="337" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="9" fill="#A0AEC0" font-style="italic">supresión baja</text>

  <!-- Cell (descarga × audiovisual): AVERSIÓN -->
  <rect x="380" y="275" width="160" height="72" rx="4" fill="#EBF4FF" stroke="#2C5282" stroke-width="1.5"/>
  <text x="460" y="300" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="12" font-weight="bold" fill="#2C5282">aversión ✓</text>
  <!-- bar background -->
  <rect x="400" y="310" width="120" height="11" rx="3" fill="#EDF2F7"/>
  <!-- bar fill: high -->
  <rect x="400" y="310" width="106" height="11" rx="3" fill="#2C5282" opacity="0.65"/>
  <text x="460" y="337" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="9" fill="#2C5282" font-style="italic">supresión alta</text>

  <!-- ── Row 2: Grupo malestar ── -->
  <!-- Row label -->
  <text x="100" y="385" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#276749">Grupo</text>
  <text x="100" y="400" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#276749">malestar</text>

  <!-- Cell (malestar × sabor): AVERSIÓN -->
  <rect x="200" y="360" width="160" height="72" rx="4" fill="#F0FFF4" stroke="#276749" stroke-width="1.5"/>
  <text x="280" y="385" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="12" font-weight="bold" fill="#276749">aversión ✓</text>
  <!-- bar background -->
  <rect x="220" y="395" width="120" height="11" rx="3" fill="#EDF2F7"/>
  <!-- bar fill: high -->
  <rect x="220" y="395" width="106" height="11" rx="3" fill="#276749" opacity="0.65"/>
  <text x="280" y="422" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="9" fill="#276749" font-style="italic">supresión alta</text>

  <!-- Cell (malestar × audiovisual): sin aversión -->
  <rect x="380" y="360" width="160" height="72" rx="4" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="1"/>
  <text x="460" y="385" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" fill="#A0AEC0">sin aversión</text>
  <!-- bar background -->
  <rect x="400" y="395" width="120" height="11" rx="3" fill="#EDF2F7"/>
  <!-- bar fill: short -->
  <rect x="400" y="395" width="18" height="11" rx="3" fill="#CBD5E0"/>
  <text x="460" y="422" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="9" fill="#A0AEC0" font-style="italic">supresión baja</text>

  <!-- Horizontal grid separator between rows -->
  <line x1="197" y1="352" x2="543" y2="352" stroke="#E2E8F0" stroke-width="0.6"/>

  <!-- Caption -->
  <text x="40" y="478" font-family="Georgia,Palatino,serif" font-size="10" fill="#718096">
    <tspan font-weight="bold">Figura 8.2.</tspan>
    <tspan> Diseño y resultados del experimento de García y Koelling. En entrenamiento todos los animales reciben el compuesto sabor+audiovisual.</tspan>
  </text>
  <text x="40" y="492" font-family="Georgia,Palatino,serif" font-size="10" fill="#718096">En prueba, los grupos se disocian: cada consecuencia genera aversión solo al estímulo biológicamente relevante para ella.</text>
</svg>
