<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="680" height="520">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2C5282" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#718096" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="520" fill="white"/>
  <rect x="0" y="0" width="680" height="3" fill="#2C5282"/>

  <text x="340" y="24" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" fill="#718096" font-style="italic">experimento de Reynolds (1961) · ensombrecimiento en palomas</text>

  <!-- ═══ FASE DE ENTRENAMIENTO ═══ -->
  <text x="40" y="45" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#2C5282">FASE DE ENTRENAMIENTO</text>

  <!-- Positive compound: triángulo+rojo → comida -->
  <!-- Red background key square -->
  <rect x="100" y="55" width="180" height="70" rx="4" fill="#FED7D7" stroke="#C05621" stroke-width="1.2"/>
  <!-- Triangle inside -->
  <polygon points="190,68 168,103 212,103" fill="white" stroke="#444" stroke-width="1.2"/>
  <text x="190" y="98" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="9" fill="#444">triángulo</text>
  <text x="190" y="115" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="10" fill="#9B2C2C" font-weight="bold">+ fondo rojo</text>

  <!-- Arrow → comida -->
  <line x1="282" y1="90" x2="318" y2="90" stroke="#2C5282" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="300" y="83" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="9" fill="#2C5282" font-style="italic">picoteo</text>

  <!-- Comida box -->
  <rect x="320" y="68" width="90" height="44" rx="4" fill="#276749" opacity="0.15" stroke="#276749" stroke-width="1.2"/>
  <text x="365" y="86" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#276749">comida</text>
  <text x="365" y="101" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="9" fill="#276749" font-style="italic">(refuerzo)</text>

  <!-- Positive label -->
  <text x="65" y="87" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#276749">S+</text>

  <!-- Negative compound: círculo+verde → nada -->
  <rect x="100" y="140" width="180" height="70" rx="4" fill="#C6F6D5" stroke="#276749" stroke-width="1.2"/>
  <!-- Circle inside -->
  <circle cx="190" cy="170" r="18" fill="white" stroke="#444" stroke-width="1.2"/>
  <text x="190" y="175" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="9" fill="#444">círculo</text>
  <text x="190" y="198" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="10" fill="#276749" font-weight="bold">+ fondo verde</text>

  <!-- Arrow → nada -->
  <line x1="282" y1="175" x2="318" y2="175" stroke="#718096" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="300" y="168" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="9" fill="#718096" font-style="italic">nada</text>

  <!-- Sin refuerzo box -->
  <rect x="320" y="153" width="90" height="44" rx="4" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="1"/>
  <text x="365" y="173" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" fill="#A0AEC0">sin</text>
  <text x="365" y="188" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" fill="#A0AEC0">refuerzo</text>

  <!-- Negative label -->
  <text x="65" y="172" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#A0AEC0">S−</text>

  <!-- Separator -->
  <line x1="40" y1="225" x2="640" y2="225" stroke="#CBD5E0" stroke-width="0.8" stroke-dasharray="5 4"/>

  <!-- ═══ FASE DE PRUEBA ═══ -->
  <text x="40" y="245" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#2C5282">FASE DE PRUEBA</text>
  <text x="40" y="258" font-family="Georgia,Palatino,serif" font-size="10" fill="#718096" font-style="italic">cada componente presentado por separado</text>

  <!-- Column headers -->
  <text x="175" y="276" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#9B2C2C">Fondo rojo</text>
  <text x="310" y="276" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#444">Triángulo</text>
  <text x="445" y="276" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#276749">Fondo verde</text>
  <text x="580" y="276" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#444">Círculo</text>

  <!-- Underlines -->
  <line x1="110" y1="280" x2="240" y2="280" stroke="#CBD5E0" stroke-width="0.8"/>
  <line x1="248" y1="280" x2="372" y2="280" stroke="#CBD5E0" stroke-width="0.8"/>
  <line x1="380" y1="280" x2="510" y2="280" stroke="#CBD5E0" stroke-width="0.8"/>
  <line x1="518" y1="280" x2="642" y2="280" stroke="#CBD5E0" stroke-width="0.8"/>

  <!-- ── Paloma 1 ── -->
  <text x="55" y="322" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#2C5282">Paloma 1</text>

  <!-- Rojo: ALTA -->
  <rect x="110" y="288" width="130" height="68" rx="4" fill="#FFF5F5" stroke="#C05621" stroke-width="1.5"/>
  <text x="175" y="311" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#C05621">responde ✓</text>
  <rect x="125" y="320" width="100" height="10" rx="3" fill="#EDF2F7"/>
  <rect x="125" y="320" width="88" height="10" rx="3" fill="#C05621" opacity="0.65"/>
  <text x="175" y="347" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="9" fill="#C05621" font-style="italic">tasa alta</text>

  <!-- Triángulo: baja -->
  <rect x="248" y="288" width="124" height="68" rx="4" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="1"/>
  <text x="310" y="311" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" fill="#A0AEC0">no responde</text>
  <rect x="264" y="320" width="92" height="10" rx="3" fill="#EDF2F7"/>
  <rect x="264" y="320" width="12" height="10" rx="3" fill="#CBD5E0"/>
  <text x="310" y="347" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="9" fill="#A0AEC0" font-style="italic">tasa baja</text>

  <!-- Verde: baja -->
  <rect x="380" y="288" width="130" height="68" rx="4" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="1"/>
  <text x="445" y="311" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" fill="#A0AEC0">no responde</text>
  <rect x="396" y="320" width="98" height="10" rx="3" fill="#EDF2F7"/>
  <rect x="396" y="320" width="12" height="10" rx="3" fill="#CBD5E0"/>
  <text x="445" y="347" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="9" fill="#A0AEC0" font-style="italic">tasa baja</text>

  <!-- Círculo: baja -->
  <rect x="518" y="288" width="124" height="68" rx="4" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="1"/>
  <text x="580" y="311" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" fill="#A0AEC0">no responde</text>
  <rect x="534" y="320" width="92" height="10" rx="3" fill="#EDF2F7"/>
  <rect x="534" y="320" width="12" height="10" rx="3" fill="#CBD5E0"/>
  <text x="580" y="347" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="9" fill="#A0AEC0" font-style="italic">tasa baja</text>

  <!-- Row separator -->
  <line x1="107" y1="362" x2="645" y2="362" stroke="#E2E8F0" stroke-width="0.6"/>

  <!-- ── Paloma 2 ── -->
  <text x="55" y="404" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#2C5282">Paloma 2</text>

  <!-- Rojo: baja -->
  <rect x="110" y="370" width="130" height="68" rx="4" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="1"/>
  <text x="175" y="393" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" fill="#A0AEC0">no responde</text>
  <rect x="125" y="402" width="100" height="10" rx="3" fill="#EDF2F7"/>
  <rect x="125" y="402" width="12" height="10" rx="3" fill="#CBD5E0"/>
  <text x="175" y="429" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="9" fill="#A0AEC0" font-style="italic">tasa baja</text>

  <!-- Triángulo: ALTA -->
  <rect x="248" y="370" width="124" height="68" rx="4" fill="#EBF4FF" stroke="#2C5282" stroke-width="1.5"/>
  <text x="310" y="393" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" font-weight="bold" fill="#2C5282">responde ✓</text>
  <rect x="264" y="402" width="92" height="10" rx="3" fill="#EDF2F7"/>
  <rect x="264" y="402" width="80" height="10" rx="3" fill="#2C5282" opacity="0.65"/>
  <text x="310" y="429" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="9" fill="#2C5282" font-style="italic">tasa alta</text>

  <!-- Verde: baja -->
  <rect x="380" y="370" width="130" height="68" rx="4" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="1"/>
  <text x="445" y="393" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" fill="#A0AEC0">no responde</text>
  <rect x="396" y="402" width="98" height="10" rx="3" fill="#EDF2F7"/>
  <rect x="396" y="402" width="12" height="10" rx="3" fill="#CBD5E0"/>
  <text x="445" y="429" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="9" fill="#A0AEC0" font-style="italic">tasa baja</text>

  <!-- Círculo: baja -->
  <rect x="518" y="370" width="124" height="68" rx="4" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="1"/>
  <text x="580" y="393" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="11" fill="#A0AEC0">no responde</text>
  <rect x="534" y="402" width="92" height="10" rx="3" fill="#EDF2F7"/>
  <rect x="534" y="402" width="12" height="10" rx="3" fill="#CBD5E0"/>
  <text x="580" y="429" text-anchor="middle" font-family="Georgia,Palatino,serif" font-size="9" fill="#A0AEC0" font-style="italic">tasa baja</text>

  <!-- Caption -->
  <text x="40" y="468" font-family="Georgia,Palatino,serif" font-size="10" fill="#718096">
    <tspan font-weight="bold">Figura 8.3.</tspan>
    <tspan> Ensombrecimiento en el experimento de Reynolds. Ambas palomas son entrenadas con el mismo compuesto positivo (triángulo+rojo).</tspan>
  </text>
  <text x="40" y="482" font-family="Georgia,Palatino,serif" font-size="10" fill="#718096">En prueba, cada paloma responde a un único componente: una al color, la otra a la forma. Ninguna responde a los dos.</text>
  <text x="40" y="496" font-family="Georgia,Palatino,serif" font-size="10" fill="#718096">Los estímulos compiten por la asignación de crédito aunque ambos fueron igualmente contiguos con el refuerzo.</text>
</svg>
