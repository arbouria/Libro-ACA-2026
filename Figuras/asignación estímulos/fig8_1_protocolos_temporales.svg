<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" width="680" height="460">
  <defs>
    <marker id="arrowG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#718096" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="430" fill="white"/>
  <rect x="0" y="0" width="680" height="3" fill="#2C5282"/>

  <text x="340" y="28" text-anchor="middle" font-family="Georgia, Palatino, serif" font-size="11" fill="#718096" font-style="italic">protocolos de condicionamiento clásico · relaciones temporales EC–EI</text>

  <!-- ─── Row labels ─── -->
  <text x="162" y="101" text-anchor="end" font-family="Georgia, Palatino, serif" font-size="12" font-weight="bold" fill="#2C5282">Demora</text>
  <text x="162" y="116" text-anchor="end" font-family="Georgia, Palatino, serif" font-size="12" font-weight="bold" fill="#2C5282">corta</text>

  <text x="162" y="166" text-anchor="end" font-family="Georgia, Palatino, serif" font-size="12" font-weight="bold" fill="#444">Demora</text>
  <text x="162" y="181" text-anchor="end" font-family="Georgia, Palatino, serif" font-size="12" font-weight="bold" fill="#444">larga</text>

  <text x="162" y="231" text-anchor="end" font-family="Georgia, Palatino, serif" font-size="12" font-weight="bold" fill="#444">Huella</text>
  <text x="162" y="246" text-anchor="end" font-family="Georgia, Palatino, serif" font-size="11" fill="#718096" font-style="italic">(trace)</text>

  <text x="162" y="296" text-anchor="end" font-family="Georgia, Palatino, serif" font-size="12" font-weight="bold" fill="#444">Hacia</text>
  <text x="162" y="311" text-anchor="end" font-family="Georgia, Palatino, serif" font-size="12" font-weight="bold" fill="#444">atrás</text>

  <!-- Guide lines -->
  <line x1="175" y1="48" x2="175" y2="340" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="520" y1="48" x2="520" y2="340" stroke="#E2E8F0" stroke-width="0.5"/>

  <!-- ═══ ROW 1: Demora corta ═══
       EC inicia en x=175, dura hasta x=380.
       EI inicia en x=310 (cuando EC aún está activo), dura hasta x=380.
       Intervalo EC-onset → EI-onset = 135px (corto). -->
  <!-- EC bar -->
  <rect x="175" y="98" width="205" height="20" rx="3" fill="#2C5282" opacity="0.85"/>
  <text x="245" y="112" text-anchor="middle" font-family="Georgia, Palatino, serif" font-size="10" fill="white" font-weight="bold">EC</text>
  <!-- EI bar, superpuesto sobre el EC, mismo extremo derecho -->
  <rect x="310" y="98" width="70" height="20" rx="3" fill="#C05621" opacity="0.9"/>
  <text x="345" y="112" text-anchor="middle" font-family="Georgia, Palatino, serif" font-size="10" fill="white" font-weight="bold">EI</text>
  <!-- Brace: intervalo EC-onset → EI-onset -->
  <line x1="175" y1="126" x2="310" y2="126" stroke="#2C5282" stroke-width="0.8" stroke-dasharray="2 2"/>
  <line x1="175" y1="122" x2="175" y2="129" stroke="#2C5282" stroke-width="0.8"/>
  <line x1="310" y1="122" x2="310" y2="129" stroke="#2C5282" stroke-width="0.8"/>
  <text x="242" y="140" text-anchor="middle" font-family="Georgia, Palatino, serif" font-size="9" fill="#2C5282" font-style="italic">intervalo corto</text>

  <!-- ═══ ROW 2: Demora larga ═══
       EC inicia en x=175, dura hasta x=420.
       EI inicia en x=360 (cuando EC aún está activo), dura hasta x=420.
       Intervalo EC-onset → EI-onset = 185px (largo). -->
  <rect x="175" y="163" width="245" height="20" rx="3" fill="#2C5282" opacity="0.65"/>
  <text x="260" y="177" text-anchor="middle" font-family="Georgia, Palatino, serif" font-size="10" fill="white" font-weight="bold">EC</text>
  <rect x="360" y="163" width="60" height="20" rx="3" fill="#C05621" opacity="0.70"/>
  <text x="390" y="177" text-anchor="middle" font-family="Georgia, Palatino, serif" font-size="10" fill="white" font-weight="bold">EI</text>
  <!-- Brace: intervalo largo -->
  <line x1="175" y1="191" x2="360" y2="191" stroke="#718096" stroke-width="0.8" stroke-dasharray="2 2"/>
  <line x1="175" y1="187" x2="175" y2="194" stroke="#718096" stroke-width="0.8"/>
  <line x1="360" y1="187" x2="360" y2="194" stroke="#718096" stroke-width="0.8"/>
  <text x="267" y="205" text-anchor="middle" font-family="Georgia, Palatino, serif" font-size="9" fill="#718096" font-style="italic">intervalo largo</text>

  <!-- ═══ ROW 3: Huella ═══
       EC inicia en x=175, termina en x=280.
       Intervalo de huella (vacío): x=280 a x=370.
       EI inicia en x=370, cuando EC ya se apagó. -->
  <rect x="175" y="228" width="105" height="20" rx="3" fill="#2C5282" opacity="0.50"/>
  <text x="227" y="242" text-anchor="middle" font-family="Georgia, Palatino, serif" font-size="10" fill="white" font-weight="bold">EC</text>
  <!-- Intervalo de huella: línea punteada horizontal -->
  <line x1="282" y1="238" x2="368" y2="238" stroke="#A0AEC0" stroke-width="1.2" stroke-dasharray="4 3"/>
  <!-- EI -->
  <rect x="370" y="228" width="80" height="20" rx="3" fill="#C05621" opacity="0.50"/>
  <text x="410" y="242" text-anchor="middle" font-family="Georgia, Palatino, serif" font-size="10" fill="white" font-weight="bold">EI</text>
  <!-- Label: intervalo de huella -->
  <text x="325" y="262" text-anchor="middle" font-family="Georgia, Palatino, serif" font-size="9" fill="#A0AEC0" font-style="italic">intervalo de huella</text>

  <!-- ═══ ROW 4: Hacia atrás ═══
       EI aparece primero (x=175 a x=255), luego el EC (x=300 a x=450). -->
  <rect x="175" y="293" width="80" height="20" rx="3" fill="#C05621" opacity="0.38"/>
  <text x="215" y="307" text-anchor="middle" font-family="Georgia, Palatino, serif" font-size="10" fill="white" font-weight="bold">EI</text>
  <rect x="295" y="293" width="155" height="20" rx="3" fill="#2C5282" opacity="0.38"/>
  <text x="372" y="307" text-anchor="middle" font-family="Georgia, Palatino, serif" font-size="10" fill="white" font-weight="bold">EC</text>

  <!-- ─── Time axis ─── -->
  <line x1="175" y1="340" x2="520" y2="340" stroke="#718096" stroke-width="1.2" marker-end="url(#arrowG)"/>
  <text x="348" y="357" text-anchor="middle" font-family="Georgia, Palatino, serif" font-size="11" fill="#718096">Tiempo</text>

  <!-- ─── Gradient bracket (right) ─── -->
  <line x1="540" y1="108" x2="540" y2="303" stroke="#718096" stroke-width="1"/>
  <line x1="535" y1="108" x2="545" y2="108" stroke="#718096" stroke-width="1"/>
  <line x1="535" y1="173" x2="545" y2="173" stroke="#718096" stroke-width="1"/>
  <line x1="535" y1="238" x2="545" y2="238" stroke="#718096" stroke-width="1"/>
  <line x1="535" y1="303" x2="545" y2="303" stroke="#718096" stroke-width="1"/>
  <line x1="540" y1="108" x2="540" y2="300" stroke="#718096" stroke-width="1.2" marker-end="url(#arrowG)"/>

  <text x="553" y="113" font-family="Georgia, Palatino, serif" font-size="11" fill="#276749" font-weight="bold">máximo</text>
  <text x="553" y="178" font-family="Georgia, Palatino, serif" font-size="11" fill="#718096">moderado</text>
  <text x="553" y="243" font-family="Georgia, Palatino, serif" font-size="11" fill="#718096">bajo</text>
  <text x="553" y="308" font-family="Georgia, Palatino, serif" font-size="11" fill="#718096">mínimo</text>
  <text x="669" y="205" text-anchor="middle" font-family="Georgia, Palatino, serif" font-size="10" fill="#718096" transform="rotate(90 669 205)" font-style="italic">aprendizaje</text>

  <!-- ─── Legend ─── -->
  <rect x="175" y="380" width="14" height="10" rx="2" fill="#2C5282"/>
  <text x="196" y="390" font-family="Georgia, Palatino, serif" font-size="11" fill="#444">EC — Estímulo condicionado</text>
  <rect x="390" y="380" width="14" height="10" rx="2" fill="#C05621"/>
  <text x="411" y="390" font-family="Georgia, Palatino, serif" font-size="11" fill="#444">EI — Suceso biológicamente importante</text>

  <!-- ─── Caption ─── -->
  <text x="175" y="430" text-anchor="start" font-family="Georgia, Palatino, serif" font-size="10" fill="#718096">
    <tspan font-weight="bold">Figura 8.1.</tspan>
    <tspan> Los cuatro protocolos temporales del condicionamiento clásico y el gradiente de la demora.</tspan>
  </text>
</svg>
